# Builds the Flutter web app and publishes it to GitHub Pages.
# Live URL once enabled: https://nvlznn.github.io/habit-tracker/
#
# Runs automatically on every push to `main`, and can also be started by hand
# from the Actions tab ("Run workflow"). The app lives in src/habibi/, so the
# build steps run there; the published files come from src/habibi/build/web.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger it manually from the Actions tab

# Permissions the deploy needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# If you push twice quickly, cancel the older run so only the latest deploys.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/habibi # the Flutter app folder
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Flutter (matches your local 3.41.5)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # --base-href MUST match the repo name with slashes, or the site loads
      # blank because it can't find its own files under /habit-tracker/.
      # --no-tree-shake-icons is required because habits/challenges build their
      # IconData from a saved code point (user-chosen icons), which a release
      # build can't tree-shake; this keeps the full icon font instead.
      - name: Build web
        run: flutter build web --release --no-tree-shake-icons --base-href "/habit-tracker/"

      - name: Upload the built site as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/habibi/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
