<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Habit Tracker by Nokapp">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nokapp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon: SVG check icon (crisp); PNG kept as a fallback. -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Nokapp - Habit Tracker</title>
  <link rel="manifest" href="manifest.json">

  <!-- Loading screen shown until Flutter paints its first frame. Colors match
       the app's light/dark themes (see _buildLightTheme / _buildDarkTheme). -->
  <style>
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background: #F4F4F6;
      transition: opacity 0.4s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        Helvetica, Arial, sans-serif;
    }
    #splash .splash-title {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #6D28D9;
      animation: splash-pulse 1.4s ease-in-out infinite;
    }
    @keyframes splash-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }
    @media (prefers-color-scheme: dark) {
      #splash { background: #0E0E0E; }
      #splash .splash-title { color: #B388FF; }
    }
  </style>
</head>
<body>
  <!-- Centered "Nokapp" loading screen; removed once Flutter is ready. -->
  <div id="splash">
    <div class="splash-title">Nokapp</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    (function () {
      function removeSplash() {
        var splash = document.getElementById('splash');
        if (!splash) return;
        splash.style.opacity = '0';
        window.setTimeout(function () {
          if (splash.parentNode) splash.parentNode.removeChild(splash);
        }, 400);
      }
      // Flutter dispatches this once the first frame paints. Listen on both
      // targets so it works regardless of where the engine fires it.
      window.addEventListener('flutter-first-frame', removeSplash);
      document.addEventListener('flutter-first-frame', removeSplash);
      // Safety net: never trap the user behind the splash if the event is missed.
      window.setTimeout(removeSplash, 15000);
    })();
  </script>
</body>
</html>
